name: Deploy T-001 to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "demos/**"
      - ".github/workflows/deploy-t001.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: demos/T-001-demo-incubator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: demos/T-001-demo-incubator/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          ELEVENTY_PATH_PREFIX: /ai-demo-seed-lab/
          GOATCOUNTER_CODE: ${{ vars.GOATCOUNTER_CODE }}
      - run: npm run test:unit
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: demos/T-001-demo-incubator/_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
